<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Fortune Teller</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #111827;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 36px 24px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
            padding: 32px;
            border: 1px solid rgba(148, 163, 184, 0.18);
        }
        h1 {
            margin: 0 0 16px;
            font-size: 3rem;
            color: #1f2937;
        }
        p.subtitle {
            margin: 0 0 26px;
            color: #475569;
            font-size: 1.05rem;
            line-height: 1.8;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #334155;
        }
        input[type="text"] {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 1rem;
            color: #0f172a;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
            margin-bottom: 18px;
        }
        .button {
            background: linear-gradient(135deg, #4f46e5, #22c55e);
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 14px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(34, 197, 94, 0.2);
        }
        .fortune-box {
            margin-top: 28px;
            padding: 24px;
            border-radius: 20px;
            background: #f8fafc;
            border: 1px solid rgba(148, 163, 184, 0.24);
            line-height: 1.8;
            color: #0f172a;
        }
        .fortune-box strong {
            display: block;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Daily Fortune</h1>
            <p class="subtitle">Enter your name and the website will tell you your fortune for the day.</p>

            <form method="POST">
                <label for="name">Your name</label>
                <input type="text" id="name" name="name" placeholder="e.g. Kalib" required>
                <button type="submit" class="button">Reveal My Fortune</button>
            </form>

            {% if fortune %}
            <div class="fortune-box">
                <strong>Fortune for {{ name }}:</strong>
                <p>{{ fortune }}</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
